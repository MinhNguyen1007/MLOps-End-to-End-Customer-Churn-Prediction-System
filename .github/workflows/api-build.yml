name: API Docker Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'serving_pipeline/api/**'
      - 'serving_pipeline/load_model.py'
      - 'serving_pipeline/pre_processing.py'
      - 'serving_pipeline/monitoring.py'
      - 'serving_pipeline/requirements.txt'
      - 'serving_pipeline/Dockerfile'
      - '.github/workflows/api-build.yml'
  pull_request:
    paths:
      - 'serving_pipeline/api/**'
      - 'serving_pipeline/load_model.py'
      - 'serving_pipeline/pre_processing.py'
      - 'serving_pipeline/monitoring.py'
      - 'serving_pipeline/requirements.txt'
      - 'serving_pipeline/Dockerfile'
      - '.github/workflows/api-build.yml'

env:
  REGISTRY: ghcr.io
  DOCKER_BUILDKIT: 1
  SERVING_REPO_PATH: serving_pipeline

jobs:
  api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize image repository (lowercase)
        id: prep
        shell: bash
        run: echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.prep.outputs.repo_lc }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix={{branch}}-

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API Docker image
        id: push-api
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVING_REPO_PATH }}
          file: ${{ env.SERVING_REPO_PATH }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.prep.outputs.repo_lc }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.prep.outputs.repo_lc }}:buildcache,mode=max

      - name: Image digest
        run: echo ${{ steps.push-api.outputs.digest }}
